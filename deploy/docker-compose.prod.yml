# Production overrides — applied on top of docker-compose.yml.
#
# docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d

services:
  app:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
