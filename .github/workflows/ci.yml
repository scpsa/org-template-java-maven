# CI workflow — powered by org-cicd auto-ci dispatcher.
#
# Triggers only when source code or CI metadata changes.
# Stages: build ──► test ──► security scan (Trivy)
#
# Project type is auto-detected from .ci.yaml (or from marker files if absent).
# See https://github.com/scpsa/org-cicd/blob/main/docs/ci-metadata.md

name: "CI"

on:
  push:
    branches: [main]
    paths:
      - "code/**"
      - ".ci.yaml"
      - ".ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "code/**"
      - ".ci.yaml"
      - ".ci.yml"

jobs:
  pipeline:
    uses: scpsa/org-cicd/.github/workflows/auto-ci.yml@v1
    secrets: inherit
